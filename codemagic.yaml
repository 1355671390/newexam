workflows:
  ios-workflow:
    name: 娇姐考试
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Force Clean and Prepare
        script: |
          # 彻底删除旧的构建残留
          flutter clean
          rm -rf build
          # 进入 ios 目录清理 pod 缓存
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf .symlinks
          cd ..
      - name: Build Flutter iOS
        script: |
          # 核心编译命令：不签名打包
          flutter build ios --release --no-codesign
      - name: Post-build (Convert to IPA)
        script: |
          set -e # 遇到错误立即停止
          # 准备导出目录
          mkdir -p Payload
          # 将编译出的 .app 复制到 Payload 文件夹
          cp -r build/ios/iphoneos/Runner.app Payload/
          # 压缩成 ipa
          zip -r Runner.ipa Payload
          # 移动到 Codemagic 指定的构件导出目录
          mv Runner.ipa $CM_EXPORT_DIR/
    artifacts:
      - $CM_EXPORT_DIR/Runner.ipa
