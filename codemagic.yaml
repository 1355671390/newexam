scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Clean build artifacts
        script: |
          # 强制删除可能导致冲突的 build 文件夹
          flutter clean
          rm -rf build
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
      - name: Build Flutter iOS
        script: |
          # 核心编译命令
          flutter build ios --release --no-codesign
      - name: Post-build (Create IPA)
        script: |
          set -e
          mkdir -p Payload
          # 注意：如果是新版 Flutter，路径可能是 build/ios/iphoneos/Runner.app
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload
          mv Runner.ipa $CM_EXPORT_DIR/
